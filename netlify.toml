[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "24"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # unsafe-inline on style-src is needed because several UI libraries (Recharts,
    # the chart tooltips, base-ui) set inline style="" attributes at runtime — there
    # is no inline <script> anywhere in the app, so script-src stays strict.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# index.html, o registo do service worker e o próprio service worker NUNCA podem ficar em
# cache do browser — se ficarem, o browser nem chega a pedir a versão nova ao servidor, e
# o utilizador vê sempre a versão antiga da app até limpar a cache manualmente (era esse
# o problema: só a aba anónima, sem cache prévia, mostrava a versão publicada mais recente).
# Os ficheiros dentro de /assets/ têm hash no nome (ex. index-Ab12Cd.js) e podem continuar
# em cache indefinidamente em segurança, porque um conteúdo novo gera sempre um nome novo.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
